name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Determine release channel
        id: channel
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MINOR=$(printf '%s' "$VERSION" | cut -d. -f2)
          if [ "$((MINOR % 2))" -eq 1 ]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Channel: beta (pre-release) for $VERSION (odd minor)"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Channel: stable for $VERSION (even minor)"
          fi

      - name: Package extension
        run: |
          PRE=""
          if [ "${{ steps.channel.outputs.prerelease }}" = "true" ]; then PRE="--pre-release"; fi
          npx vsce package $PRE -o tmux-integrated.vsix

      - name: Publish extension to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath tmux-integrated.vsix

      - name: Publish extension to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish tmux-integrated.vsix -p "$OVSX_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: '*.vsix'
          prerelease: ${{ steps.channel.outputs.prerelease }}
          generate_release_notes: true
